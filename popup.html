<!DOCTYPE html>
<html>
<head>
<style>
  body { width: 320px; padding: 16px; font-family: -apple-system, sans-serif; font-size: 13px; }
  input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; box-sizing: border-box; }
  input:focus { outline: none; border-color: #999; }
  button { width: 100%; padding: 10px; background: #0f172a; color: #fff; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; margin-top: 10px; }
  button:hover { background: #1e293b; }
  button:disabled { background: #94a3b8; cursor: default; }
  label { display: block; font-weight: 500; margin-bottom: 6px; color: #333; }
  .hint { font-size: 11px; color: #999; margin-top: 4px; }
  .status { margin-top: 10px; font-size: 12px; color: #64748b; display: none; }
</style>
</head>
<body>
  <label>Figma URL</label>
  <input id="url" type="text" placeholder="https://www.figma.com/design/FILE_KEY/..." />
  <div class="hint">粘贴 Figma 文件链接，自动提取 fileKey</div>
  <button id="capture">Capture to Figma</button>
  <div id="status" class="status"></div>
  <script src="popup.js"></script>
</body>
</html>
